<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matriz de Enfoques 2x2</title>
    <style>
        :root {
            --primary: #4a90e2;
            --text-main: #2c3e50;
            --text-sub: #5a6c7d;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .grid-wrapper {
            display: grid;
            /* Fuerza la distribución 2x2 */
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, auto);
            gap: 20px;
            width: 90%;
            max-width: 900px;
            perspective: 1000px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 40px 30px;
            position: relative;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
            border-left: 6px solid var(--primary);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            
            /* Animación de entrada */
            opacity: 0;
            transform: scale(0.8) translateY(30px);
            animation: fadeInCard 0.6s ease-out forwards;
        }

        @keyframes fadeInCard {
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* Retrasos para el efecto 2x2 */
        .card:nth-child(1) { animation-delay: 0.1s; border-color: #4a90e2; }
        .card:nth-child(2) { animation-delay: 0.2s; border-color: #10b981; }
        .card:nth-child(3) { animation-delay: 0.3s; border-color: #f59e0b; }
        .card:nth-child(4) { animation-delay: 0.4s; border-color: #8b5cf6; }

        .card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            z-index: 10;
        }

        .number {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 3rem;
            font-weight: 900;
            color: rgba(0,0,0,0.05);
            line-height: 1;
            user-select: none;
        }

        h2 {
            margin: 0 0 10px 0;
            font-size: 1.4rem;
            color: var(--text-main);
            line-height: 1.2;
        }

        p {
            margin: 0;
            color: var(--text-sub);
            font-size: 1rem;
            font-weight: 500;
            opacity: 0.8;
        }

        /* Ajuste para móviles (pasa de 2x2 a 1x1) */
        @media (max-width: 600px) {
            .grid-wrapper {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="grid-wrapper">
        <div class="card">
            <div class="number">1</div>
            <h2>Enfoque Técnico o Prescriptivo</h2>
            <p>La Racionalidad de la Ingeniería</p>
        </div>

        <div class="card">
            <div class="number">2</div>
            <h2>Enfoque Práctico-Deliberativo</h2>
            <p>Currículo como Proceso y Juicio Profesional</p>
        </div>

        <div class="card">
            <div class="number">3</div>
            <h2>Enfoque Crítico y Reconceptualista</h2>
            <p>Sociología y Desvelamiento Ideológico</p>
        </div>

        <div class="card">
            <div class="number">4</div>
            <h2>Enfoque Poscrítico</h2>
            <p>Identidad, Subjetividad y "Currere"</p>
        </div>
    </div>

</body>
</html>
