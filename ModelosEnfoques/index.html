<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enfoques Curriculares con Animación</title>
    <style>
        :root {
            --primary: #4a90e2;
            --secondary: #f4f7f9;
            --text-main: #2c3e50;
            --text-sub: #5a6c7d;
            --accent: #eef2f7;
            --transition: all 0.3s ease;
            /* Tiempo base de la animación */
            --anim-duration: 0.6s;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow-x: hidden; /* Evita barras de desplazamiento durante la animación */
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1200px;
            width: 100%;
            padding: 20px 0;
        }

        /* --- Estilos de la Tarjeta (Base) --- */
        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease; /* Transición suave para el hover */
            border-top: 5px solid var(--primary);
            overflow: hidden;
            
            /* --- ESTADO INICIAL PARA LA ANIMACIÓN --- */
            opacity: 0; /* Invisible al principio */
            transform: translateY(40px); /* Desplazada hacia abajo */
            
            /* --- DISPARADOR DE LA ANIMACIÓN --- */
            animation: entradaSutil var(--anim-duration) ease-out forwards;
        }

        /* --- Definición de la Animación de Entrada --- */
        @keyframes entradaSutil {
            to {
                opacity: 1; /* Totalmente visible */
                transform: translateY(0); /* En su posición original */
            }
        }

        /* --- RETRASOS ESCALONADOS (Staggered Delays) --- */
        /* Cada tarjeta espera un poco más que la anterior */
        .card:nth-child(1) { animation-delay: 0.1s; border-color: #4a90e2; }
        .card:nth-child(2) { animation-delay: 0.3s; border-color: #50c878; }
        .card:nth-child(3) { animation-delay: 0.5s; border-color: #ffb347; }
        .card:nth-child(4) { animation-delay: 0.7s; border-color: #9b59b6; }

        /* --- Efecto Hover (se mantiene independiente de la animación de entrada) --- */
        .card:hover {
            transform: translateY(-10px) !important; /* El !important asegura que gane al estado final de la animación */
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            cursor: pointer;
        }

        /* --- Estilos de contenido (igual que antes) --- */
        .number-badge {
            position: absolute;
            top: -10px;
            right: 20px;
            color: white;
            width: 40px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1.2rem;
            clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 50% 85%, 0% 100%);
        }

        /* Colores de los badges (badges) correspondientes */
        .card:nth-child(1) .number-badge { background: #4a90e2; }
        .card:nth-child(2) .number-badge { background: #50c878; }
        .card:nth-child(3) .number-badge { background: #ffb347; }
        .card:nth-child(4) .number-badge { background: #9b59b6; }

        .card-content h2 {
            font-size: 1.25rem;
            color: var(--text-main);
            margin-bottom: 15px;
            line-height: 1.3;
            margin-top: 10px;
        }

        .card-content p {
            font-size: 0.95rem;
            color: var(--text-sub);
            margin: 0;
            padding-left: 15px;
            border-left: 2px solid var(--accent);
            font-style: italic;
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <div class="number-badge">1</div>
            <div class="card-content">
                <h2>Enfoque Técnico o Prescriptivo</h2>
                <p>La Racionalidad de la Ingeniería</p>
            </div>
        </div>

        <div class="card">
            <div class="number-badge">2</div>
            <div class="card-content">
                <h2>Enfoque Práctico-Deliberativo</h2>
                <p>Currículo como Proceso y Juicio Profesional</p>
            </div>
        </div>

        <div class="card">
            <div class="number-badge">3</div>
            <div class="card-content">
                <h2>Enfoque Crítico y Reconceptualista</h2>
                <p>Sociología y Desvelamiento Ideológico</p>
            </div>
        </div>

        <div class="card">
            <div class="number-badge">4</div>
            <div class="card-content">
                <h2>Enfoque Poscrítico</h2>
                <p>Identidad, Subjetividad y "Currere"</p>
            </div>
        </div>
    </div>

</body>
</html>
