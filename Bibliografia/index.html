<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bibliografía - Teoría Curricular</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-color: #003366; 
            --accent-bright: #00ffff; 
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(0, 255, 255, 0.2);
            --text-main: #ffffff;
            --text-dim: #99ffff;
        }

        body {
            margin: 0; padding: 0; min-height: 100vh;
            font-family: 'Inter', sans-serif;
            background-color: #00050a;
            color: var(--text-main);
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden; cursor: default;
        }

        #custom-cursor-tool {
            position: fixed; pointer-events: none;
            background: var(--accent-bright); color: #000;
            padding: 5px 12px; border-radius: 20px;
            font-size: 0.75rem; font-weight: 700;
            z-index: 9999; display: none;
            transform: translate(15px, 15px);
            box-shadow: 0 0 15px var(--accent-bright);
        }

        .fluid-background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden; background: #000810; filter: blur(80px);
        }
        .fluid-layer { position: absolute; border-radius: 50%; opacity: 0.4; animation: fluidMove infinite alternate ease-in-out; }
        .layer-1 { background: radial-gradient(circle, #004488 0%, transparent 70%); width: 100vw; height: 100vw; top: -30%; left: -10%; animation-duration: 20s; }
        .layer-2 { background: radial-gradient(circle, #001a33 0%, transparent 70%); width: 80vw; height: 80vw; bottom: -20%; right: -10%; animation-duration: 25s; }
        @keyframes fluidMove { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(10%, 5%) scale(1.1); } }

        .nav-instruction {
            width: 90vw; max-width: 1400px;
            background: rgba(0, 255, 255, 0.1);
            border: 1px dashed var(--accent-bright);
            padding: 15px; border-radius: 12px;
            margin-top: 30px;
            text-align: center;
            font-size: 0.9rem; color: var(--accent-bright);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .main-header { text-align: center; padding: 30px 20px; z-index: 1; }
        .main-header h1 { font-weight: 300; font-size: 2rem; letter-spacing: 6px; text-transform: uppercase; margin: 0; background: linear-gradient(to right, #fff, var(--accent-bright)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .main-header .line { width: 60px; height: 3px; background: var(--accent-bright); margin: 15px auto; }

        .reference-grid {
            display: grid; width: 90vw; max-width: 1400px;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px; padding-bottom: 80px; z-index: 1;
        }

        .card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px; padding: 25px;
            display: flex; flex-direction: column;
            transition: all 0.3s ease;
            min-height: 180px;
        }
        .card:hover { border-color: var(--accent-bright); transform: translateY(-5px); background: rgba(0, 255, 255, 0.05); }

        .author-tag { font-size: 0.7rem; font-weight: 600; color: var(--accent-bright); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; }
        .title { font-size: 0.95rem; line-height: 1.5; color: var(--text-main); margin-bottom: 15px; }

        .footer-info {
            font-size: 0.75rem; color: var(--text-dim);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 15px; margin-top: auto; font-style: italic;
        }

        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn-visit { text-decoration: none; background: var(--accent-bright); color: #000; padding: 6px 12px; border-radius: 6px; font-size: 0.7rem; font-weight: 700; }
        .btn-copy { background: transparent; border: 1px solid var(--accent-bright); color: var(--accent-bright); padding: 6px 12px; border-radius: 6px; font-size: 0.7rem; cursor: pointer; }
        .btn-copy:hover { background: var(--accent-bright); color: #000; }
        
    </style>
</head>
<body>

    <div id="custom-cursor-tool">¡Enlace Copiado!</div>

    <div class="fluid-background">
        <div class="fluid-layer layer-1"></div>
        <div class="fluid-layer layer-2"></div>
    </div>

    <div class="nav-instruction">
        🚀 <b>Navegación del Proyecto:</b> Explora las bases de la teoría curricular. Usa <b>Visitar</b> para recursos en PDF/Web o <b>Copiar Link</b> para guardarlos.
    </div>

    <header class="main-header">
        
        <div class="line"></div>
    </header>

    <main class="reference-grid" id="grid"></main>

    <script>
        const sources = [
            { a: "Althusser, L. (1970)", t: "Ideología y aparatos ideológicos de Estado", f: "Ediciones Pepe Medellín", u: null },
            { a: "Apple, M. W. (1979)", t: "Ideology and curriculum", f: "Routledge & K. Paul", u: null },
            { a: "Apple, M. W. (2018)", t: "Ideología y Currículo (Ejes 1 y 3)", f: "Akal", u: null },
            { a: "Bobbitt, F. (1918)", t: "The Curriculum (Eje 1)", f: "Houghton Mifflin", u: null },
            { a: "Bourdieu, P., & Passeron, J.-C. (1970)", t: "La reproducción", f: "Documento Académico", u: "https://www.uv.mx/mie/files/2012/10/reproduccion.pdf" },
            { a: "Bruner, J. S. (1960)", t: "The process of education", f: "Harvard University Press", u: null },
            { a: "Dewey, J. (1916)", t: "Democracy and education", f: "NSEE Knowledge Center", u: "https://nsee.memberclicks.net/assets/docs/KnowledgeCenter/BuildingExpEduc/BooksReports/10.%20democracy%20and%20education%20by%20dewey.pdf" },
            { a: "Eisner, E. (1979)", t: "The Educational Imagination", f: "Macmillan", u: null },
            { a: "Freire, P. (1970)", t: "Pedagogía del oprimido", f: "Tierra Nueva", u: null },
            { a: "Fullan, M. (2001)", t: "The new meaning of educational change (3rd ed.)", f: "Teachers College Press", u: null },
            { a: "Gagné, R. M. (1970)", t: "Las condiciones del aprendizaje", f: "Aguilar", u: null },
            { a: "Giroux, H. (1983)", t: "Teoría y Resistencia en la Educación", f: "Biblioteca Digital", u: "https://biblioteca.colegioblancagraciela.com.ve/wp-content/uploads/2022/10/Henry-A-Giroux-Teoria-y-resistencia-en-educacion.pdf" },
            { a: "Giroux, H. A. (1990)", t: "Los profesores como intelectuales (Eje 3)", f: "Paidós", u: null },
            { a: "Jackson, W. (1990)", t: "La vida en las aulas", f: "Recurso UV", u: "https://www.uv.mx/mie/files/2012/10/lavidaenlasaulas.pdf" },
            { a: "Piaget, J. (1952)", t: "The origins of intelligence in children", f: "International Universities Press", u: null },
            { a: "Pinar, W. (1975)", t: "Curriculum theorizing: The reconceptualists", f: "McCutchan Publishing", u: null },
            { a: "Schiro, M. S. (2013)", t: "Curriculum theory: Conflicting visions (2nd ed.)", f: "SAGE Publications", u: null },
            { a: "Schwab, J. J. (1969)", t: "The Practical: A Language for Curriculum (Eje 3)", f: "School Review", u: null },
            { a: "Skinner, B. F. (1953)", t: "Condicionamiento operante (La caja de Skinner)", f: "Neuro-Class", u: "https://neuro-class.com/condicionamiento-operante-la-caja-skinner/" },
            { a: "Stenhouse, L. (1984)", t: "Investigación y desarrollo del currículum (Eje 3)", f: "Morata", u: null },
            { a: "Stufflebeam & otros. (1971)", t: "Educational evaluation and decision making", f: "Phi Delta Kappa", u: null },
            { a: "Tyler, R. (1949)", t: "Principios Básicos de Currículo e Instrucción (Eje 1 y 3)", f: "Kapelusz", u: null },
            { a: "Vygotsky, L. S. (1978)", t: "Mind in society", f: "Harvard University Press", u: null }
        ];

        const grid = document.getElementById('grid');
        const tool = document.getElementById('custom-cursor-tool');

        document.addEventListener('mousemove', (e) => {
            tool.style.left = e.clientX + 'px';
            tool.style.top = e.clientY + 'px';
        });

        sources.forEach((s) => {
            const card = document.createElement('div');
            card.className = 'card';
            
            let html = `
                <div class="author-tag">${s.a}</div>
                <div class="title">${s.t}</div>
                <div class="footer-info">${s.f}</div>
            `;

            if(s.u) {
                html += `
                    <div class="btn-group">
                        <a href="${s.u}" target="_blank" class="btn-visit">Visitar</a>
                        <button class="btn-copy" onclick="copyLink('${s.u}')">Copiar Link</button>
                    </div>
                `;
            }

            card.innerHTML = html;
            grid.appendChild(card);
        });

        function copyLink(url) {
            navigator.clipboard.writeText(url).then(() => {
                tool.style.display = 'block';
                setTimeout(() => { tool.style.display = 'none'; }, 1500);
            });
        }
    </script>
</body>
</html>
