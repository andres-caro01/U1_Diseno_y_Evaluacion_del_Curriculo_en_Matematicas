<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelos Curriculares</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #2563eb;
            --accent-cyan: #06b6d4;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f1f5f9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            overflow: hidden;
        }

        /* Instrucción en la parte superior derecha */
        .instruction {
            position: fixed;
            top: 30px;
            right: 30px;
            font-weight: 300;
            font-size: 0.85rem;
            color: #94a3b8;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 20px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            animation: softFloat 4s infinite ease-in-out;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        @keyframes softFloat {
            0%, 100% { transform: translateY(0); opacity: 0.8; }
            50% { transform: translateY(-5px); opacity: 1; }
        }

        .container {
            display: flex;
            gap: 2.5rem;
            perspective: 1200px;
        }

        /* Tarjetas */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 3rem;
            width: 320px;
            cursor: pointer;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            opacity: 0;
            transform: translateY(60px);
            animation: fadeInUp 0.8s forwards;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            text-align: center;
        }

        .card:nth-child(2) { animation-delay: 0.25s; }

        .card:hover {
            transform: translateY(-20px) scale(1.05);
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--accent-cyan);
            box-shadow: 0 25px 50px rgba(6, 182, 212, 0.3);
        }

        .card-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            display: block;
            filter: drop-shadow(0 5px 15px rgba(6, 182, 212, 0.4));
        }

        .card h2 {
            font-size: 1.3rem;
            line-height: 1.4;
            margin: 0;
            font-weight: 400;
            color: #fff;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-content {
            background: #ffffff;
            color: #1e293b;
            width: 90%;
            max-width: 700px;
            max-height: 80vh;
            border-radius: 35px;
            padding: 4rem;
            position: relative;
            transform: translateY(100px) scale(0.8);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow-y: auto;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0) scale(1);
        }

        .close-btn {
            position: absolute;
            top: 30px;
            right: 30px;
            background: #f1f5f9;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            transition: 0.3s;
        }

        .close-btn:hover { background: #cbd5e1; transform: rotate(90deg); }

        .modal-body h2 {
            color: var(--primary-blue);
            font-size: 1.8rem;
            margin-top: 0;
            margin-bottom: 1.5rem;
            font-weight: 600;
        }

        .modal-body p { line-height: 1.8; font-size: 1.1rem; margin-bottom: 1.5rem; }
        .modal-body ul { padding-left: 20px; line-height: 1.8; margin-bottom: 1.5rem; }
        .modal-body li { margin-bottom: 15px; }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-content::-webkit-scrollbar { width: 6px; }
        .modal-content::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="instruction">Haga clic sobre las tarjetas para ampliar la información.</div>

    <div class="container">
        <div class="card" onclick="openModal('bobbitt')">
            <span class="card-icon">📖</span>
            <h2>(Bobbitt, 1918) y el Currículo como ciencia</h2>
        </div>

        <div class="card" onclick="openModal('tyler')">
            <span class="card-icon">⚙️</span>
            <h2>(Tyler, 1949) y el Racional de Tyler</h2>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="closeModal()">✕</button>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script>
        const data = {
            bobbitt: `
                <h2>(Bobbitt, 1918) y el Currículo como ciencia</h2>
                <p>Bobbitt fue pionero al proponer que el currículo debe derivarse del análisis de las actividades que los adultos realizan en la sociedad, traduciendo esas "actividades" en objetivos a alcanzar por los estudiantes. Su obra <i>The Curriculum</i> (1918) postuló la idea de que la educación debe preparar de manera precisa para la vida social, asumiendo una visión instrumental y predecible del proceso educativo.</p>
            `,
            tyler: `
                <h2>(Tyler, 1949) y el Racional de Tyler</h2>
                <p>El modelo de Ralph W. Tyler, expuesto en <i>Basic Principles of Curriculum and Instruction</i> (1949), sistematizó el diseño curricular bajo una lógica de cuatro preguntas fundamentales que aún hoy estructuran muchos currículos:</p>
                <ul>
                    <li>¿Qué fines desea alcanzar la escuela? (Objetivos).</li>
                    <li>¿Qué experiencias educativas pueden ofrecerse que tengan probabilidad de alcanzar estos fines? (Contenido y Métodos).</li>
                    <li>¿Cómo pueden organizarse estas experiencias de manera efectiva? (Organización).</li>
                    <li>¿Cómo comprobar si se han alcanzado los fines? (Evaluación).</li>
                </ul>
                <p>El modelo de Tyler, si bien es lógico y claro, ha sido el principal blanco de las críticas al enfoque técnico, por su linealidad y por presuponer la neutralidad de los objetivos.</p>
            `
        };

        function openModal(id) {
            const modal = document.getElementById('modalOverlay');
            const body = document.getElementById('modalBody');
            body.innerHTML = data[id];
            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
    </script>
</body>
</html>
